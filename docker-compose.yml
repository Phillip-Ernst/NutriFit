services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrifit-db
    environment:
      POSTGRES_DB: ${DB_NAME:-nutrifit}
      POSTGRES_USER: ${DB_USER:-nutrifit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nutrifit} -d ${DB_NAME:-nutrifit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrifit-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nutrifit}
      DB_USER: ${DB_USER:-nutrifit}
      DB_PASSWORD: ${DB_PASSWORD:-localdev}
      SPRING_PROFILES_ACTIVE: docker
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-key-minimum-32-chars}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID_DEV: ${GITHUB_CLIENT_ID_DEV:-}
      GITHUB_CLIENT_SECRET_DEV: ${GITHUB_CLIENT_SECRET_DEV:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nutrition-service:
    build:
      context: ./nutrition-service
      dockerfile: Dockerfile
    container_name: nutrifit-nutrition
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nutrifit_nutrition
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-nutrifit}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-localdev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-key-minimum-32-chars}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8081/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nutrifit-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
      nutrition-service:
        condition: service_healthy

volumes:
  postgres_data:
