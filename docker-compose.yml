# Full stack: runs postgres + backend + frontend as Docker containers.
# Use this to test the built application end-to-end (production-like).
# For active development with hot-reload, run each service individually instead:
#   backend: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local (from backend/)
#   nutrition: ./mvnw spring-boot:run (from nutrition-service/)
#   frontend: npm run dev (from frontend/)
# See CLAUDE.md for full local development instructions.

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrifit-db
    environment:
      POSTGRES_DB: nutrifit
      POSTGRES_USER: nutrifit
      POSTGRES_PASSWORD: nutrifit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrifit -d nutrifit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrifit-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/NutriFit-backend.env
    environment:
      DB_HOST: postgres      # override env_file: use container hostname, not localhost
      DB_PASSWORD: nutrifit  # override env_file: match the postgres service above
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nutrifit-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
