# DB-only: starts PostgreSQL for local Maven development (port 5432).
# Also runs init-multiple-dbs.sh to create both nutrifit and nutrifit_nutrition schemas.
# Usage: docker compose up -d (from backend/ directory)
#
# After starting the DB, run services manually:
#   backend:   source NutriFit-backend.env && ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
#   nutrition: source NutriFit-backend.env && cd ../nutrition-service && ./mvnw spring-boot:run
#   frontend:  npm run dev (from frontend/)
#
# NOTE: The init script (init-multiple-dbs.sh) only runs on first container creation.
# To reset both databases:
#   docker compose down -v && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrifit-db
    environment:
      POSTGRES_DB: nutrifit
      POSTGRES_USER: nutrifit
      POSTGRES_PASSWORD: nutrifit
    ports:
      - "5432:5432"
    volumes:
      - nutrifit-data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrifit -d nutrifit"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: nutrifit-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  nutrifit-data:
