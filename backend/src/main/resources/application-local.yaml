# Local development configuration
# Start database: ./scripts/db-setup.sh start
# Run migrations: ./scripts/db-setup.sh migrate

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: "http://localhost:5173/api/login/oauth2/code/google"
          github:
            client-id: ${GITHUB_CLIENT_ID_DEV}
            client-secret: ${GITHUB_CLIENT_SECRET_DEV}
            redirect-uri: "http://localhost:5173/api/login/oauth2/code/github"

# For local development, you can override JWT secret here
# In production, this MUST be set via environment variable
jwt:
  secret: ${JWT_SECRET}
